<script>
const WORKER_URL = 'https://roteirowriter.12jorgehenriquejpff123.workers.dev';

let formats = JSON.parse(localStorage.getItem('rw_formats') || '[]');
let roteiros = JSON.parse(localStorage.getItem('rw_roteiros') || '[]');
let selectedFormat = null;
let analyzedFormatData = null;
let currentRefCount = 5;
let refSlotTexts = {};
let refSlotTitles = {};
let activeViewerIndex = -1;
let srtContent = '';

const qtyHints = {
  2: '2 roteiros é o mínimo. Funciona, mas pode não capturar variações do estilo. <span style="color:var(--d2)">Resultado: básico.</span>',
  3: '3 roteiros já permite identificar padrões consistentes. <span style="color:var(--d2)">Resultado: bom.</span>',
  5: '5 roteiros captura o estilo com alta fidelidade. <span style="color:var(--y)">Recomendado para a maioria dos casos.</span>',
  7: '7 roteiros permite detectar nuances e variações contextuais do estilo. <span style="color:var(--g)">Alta qualidade.</span>',
  10: '10 roteiros extrai o DNA completo — padrões sutis, vocabulário recorrente, variações por tema. <span style="color:var(--g)">Máxima semelhança.</span>'
};

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function safeUpper(text) {
  return String(text || '').toUpperCase();
}

function showNotif(msg, err = false) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = 'notif visible' + (err ? ' err' : '');
  setTimeout(() => {
    el.className = 'notif';
  }, 3500);
}

async function fetchWorker(payload) {
  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  let data;
  try {
    data = await response.json();
  } catch {
    throw new Error(`Resposta inválida do Worker (HTTP ${response.status})`);
  }

  if (!response.ok) {
    throw new Error(data?.error?.message || data?.message || `Erro HTTP ${response.status}`);
  }

  if (data?.error) {
    throw new Error(data.error.message || 'Erro desconhecido no Worker');
  }

  return data;
}

function extractResponseText(data) {
  if (Array.isArray(data?.content)) {
    return data.content
      .filter(block => block && (block.type === 'text' || typeof block.text === 'string'))
      .map(block => block.text || '')
      .join('');
  }

  if (typeof data?.content === 'string') return data.content;
  if (typeof data?.text === 'string') return data.text;
  if (typeof data?.completion === 'string') return data.completion;
  if (typeof data?.result === 'string') return data.result;

  throw new Error('A resposta da IA veio em formato inesperado');
}

function parseBestJson(text) {
  const clean = String(text || '').replace(/```json|```/g, '').trim();
  const jsonStart = clean.indexOf('{');
  const jsonEnd = clean.lastIndexOf('}') + 1;

  if (jsonStart === -1 || jsonEnd <= jsonStart) {
    throw new Error('A IA não retornou JSON válido');
  }

  return JSON.parse(clean.slice(jsonStart, jsonEnd));
}

// ── RENDER FORMATS ──
function renderFormats() {
  const list = document.getElementById('format-list');
  const pills = document.getElementById('format-pills');
  const count = document.getElementById('format-count');
  count.textContent = formats.length;

  if (formats.length === 0) {
    list.innerHTML = '<div class="empty-formats"><span class="big">✍</span>Nenhum canal ainda.<br>Analise roteiros de referência.</div>';
    pills.innerHTML = '<span class="no-formats-msg">Nenhum canal salvo ainda — clique em "+ Novo Canal" para analisar roteiros de referência.</span>';
    return;
  }

  list.innerHTML = formats.map((f, i) => `
    <div class="format-card ${selectedFormat === i ? 'selected' : ''}" onclick="selectFormat(${i})">
      <div class="format-card-name">${escapeHtml(f.name)}</div>
      <div class="format-card-meta">
        ${escapeHtml(f.writingStyle || '')}<br>
        <span class="format-card-tag tag-r">${escapeHtml(f.tone || 'Tom')}</span>
        <span class="format-card-tag tag-y">${escapeHtml(f.pacing || 'Ritmo')}</span>
        <span class="format-card-tag tag-g">${escapeHtml(f.structureType || 'Estrutura')}</span>
        <span class="format-card-tag tag-b">${escapeHtml(f.roteiroCount || 1)} roteiro${(f.roteiroCount || 1) > 1 ? 's' : ''}</span>
      </div>
    </div>
  `).join('');

  pills.innerHTML = formats.map((f, i) => `
    <div class="format-pill ${selectedFormat === i ? 'active' : ''}" onclick="selectFormat(${i})">${escapeHtml(f.name)}</div>
  `).join('');
}

function selectFormat(i) {
  selectedFormat = i;
  document.getElementById('selected-format-name').textContent = formats[i].name;
  renderFormats();
}

// ── RENDER ROTEIROS ──
function renderRoteiros() {
  const grid = document.getElementById('rot-grid');
  const count = document.getElementById('rot-count');
  const navCount = document.getElementById('nav-rot-count');
  count.textContent = roteiros.length;

  if (roteiros.length > 0) {
    navCount.style.display = '';
    navCount.textContent = roteiros.length;
  } else {
    navCount.style.display = 'none';
  }

  if (roteiros.length === 0) {
    grid.innerHTML = '<div class="empty-state"><span class="icon">✍</span><p>Nenhum roteiro criado ainda.<br>Selecione um canal e defina o tema.</p></div>';
    return;
  }

  grid.innerHTML = roteiros.map((r, i) => `
    <div class="rot-card" onclick="openInViewer(${i})">
      <div class="rot-card-title">${escapeHtml(r.title)}</div>
      <div class="rot-card-meta">${escapeHtml(r.words || '—')} palavras · ${escapeHtml(r.date || '')}</div>
      <div class="rot-card-format">◆ ${escapeHtml(r.canal || '')}</div>
    </div>
  `).join('');
}

function openInViewer(i) {
  activeViewerIndex = i;
  switchPage('meus');
  viewRoteiro(i);
}

// ── MODAL ──
function openNewFormat() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('analysis-result').classList.remove('visible');
  document.getElementById('modal-status').classList.remove('visible');
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('analyze-btn').style.display = '';
  document.getElementById('analyze-btn').disabled = false;
  document.getElementById('analyze-btn').textContent = '◉ ANALISAR ROTEIROS';
  document.getElementById('format-name-input').value = '';
  refSlotTexts = {};
  refSlotTitles = {};
  setRefCount(5);
  analyzedFormatData = null;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ── REF COUNT ──
function setRefCount(n) {
  currentRefCount = n;
  [2,3,5,7,10].forEach(x => {
    const btn = document.getElementById('qty-' + x);
    if (btn) btn.classList.toggle('active', x === n);
  });
  document.getElementById('qty-hint-text').innerHTML = qtyHints[n] || '';
  renderRefSlots();
}

function renderRefSlots() {
  const container = document.getElementById('ref-slots');
  const slots = [];

  for (let i = 0; i < currentRefCount; i++) {
    const hasText = refSlotTexts[i] && refSlotTexts[i].trim().length > 50;
    const wordCount = hasText ? refSlotTexts[i].trim().split(/\s+/).length : 0;

    slots.push(`
      <div class="ref-slot open" id="refslot-${i}">
        <div class="ref-slot-hdr" onclick="toggleRefSlot(${i})">
          <span class="ref-slot-num">ROT ${String(i + 1).padStart(2, '0')}</span>
          <span class="ref-slot-label" id="refslot-label-${i}">Roteiro de referência ${i + 1}</span>
          <span class="${hasText ? 'badge-ok' : 'badge-empty'}" id="refslot-badge-${i}">
            ${hasText ? `✓ ${wordCount} palavras` : 'VAZIO'}
          </span>
          <span class="ref-slot-arrow">▼</span>
        </div>
        <div class="ref-slot-body">
          <div style="margin-bottom:8px;">
            <div style="font-size:7px;color:var(--d2);letter-spacing:.12em;margin-bottom:5px;">TÍTULO DO VÍDEO (OPCIONAL)</div>
            <input
              type="text"
              class="field-input"
              style="font-size:9px;padding:6px 10px;margin-bottom:8px;"
              placeholder="Ex: 'Por que os dinossauros foram extintos?'"
              id="refslot-title-${i}"
              oninput="updateRefTitle(${i})"
            >
          </div>
          <div style="font-size:7px;color:var(--d2);letter-spacing:.12em;margin-bottom:5px;">TEXTO DO ROTEIRO</div>
          <textarea
            class="field-input"
            style="min-height:160px;font-size:10px;line-height:1.7;"
            placeholder="Cole aqui o roteiro completo deste vídeo — quanto mais texto, melhor a análise..."
            id="refslot-text-${i}"
            oninput="updateRefSlot(${i})"
          ></textarea>
        </div>
      </div>
    `);
  }

  container.innerHTML = slots.join('');

  for (let i = 0; i < currentRefCount; i++) {
    const titleEl = document.getElementById('refslot-title-' + i);
    const textEl = document.getElementById('refslot-text-' + i);
    if (titleEl) titleEl.value = refSlotTitles[i] || '';
    if (textEl) textEl.value = refSlotTexts[i] || '';
  }
}

function toggleRefSlot(i) {
  document.getElementById('refslot-' + i).classList.toggle('open');
}

function updateRefTitle(i) {
  const el = document.getElementById('refslot-title-' + i);
  refSlotTitles[i] = el ? el.value : '';
}
